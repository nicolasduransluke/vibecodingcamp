// Planetas cercanos al inicio/fin para verlos bien

// Y cada parada mas larga que la anterior

function getFlyDur(i){ return 12 + i * 1.2; } // 12s primer viaje, crece 1.2s por parada!

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(55,1,0.1,300);
cam.position.set(0,0,14);cam.lookAt(0,0,0);

function resize(){const w=canvas.parentElement.offsetWidth,h=430;renderer.setSize(w,h,false);cam.aspect=w/h;cam.updateProjectionMatrix();}
resize();window.addEventListener('resize',resize);
scene.add(new THREE.AmbientLight(0x556677,1.8));
const dl=new THREE.DirectionalLight(0xfffbe0,2.2);dl.position.set(6,8,6);scene.add(dl);
const pl=new THREE.PointLight(0x6644ff,2,80);scene.add(pl);

const sg=new THREE.BufferGeometry();const sv=new Float32Array(1000*3);
for(let i=0;i<1000;i++){sv[i*3]=(Math.random()-.5)*140;sv[i*3+1]=(Math.random()-.5)*600;sv[i*3+2]=(Math.random()-.5)*30-8;}
sg.setAttribute('position',new THREE.BufferAttribute(sv,3));
const starField=new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:.09,sizeAttenuation:true}));
scene.add(starField);

// Posiciones: planeta actual abajo (-5), proximo muy arriba (aparece durante llegada)
const BOT_Y=-5, TOP_Y=5;

function mkPlanet(s){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.SphereGeometry(s.size,32,24),new THREE.MeshPhongMaterial({color:s.color,shininess:60})));
  if(s.ring){const r=new THREE.Mesh(new THREE.TorusGeometry(s.size*1.7,.2,8,60),new THREE.MeshPhongMaterial({color:0xd4b96a,transparent:true,opacity:.85,side:THREE.DoubleSide}));r.rotation.x=Math.PI/2+.25;g.add(r);}
  if(s.bands){const bm=new THREE.MeshPhongMaterial({color:0x9a5a20,transparent:true,opacity:.45,side:THREE.DoubleSide});[-1,-.3,.3,1].forEach(y=>{const b=new THREE.Mesh(new THREE.TorusGeometry(s.size*.92,.14,4,40),bm);b.rotation.x=Math.PI/2;b.position.y=y*.38;g.add(b);});}
  if(s.land){const lm=new THREE.MeshPhongMaterial({color:0x2a8a2a});for(let i=0;i<4;i++){const c=new THREE.Mesh(new THREE.SphereGeometry(.25+Math.random()*.2,8,6),lm);const a=Math.random()*Math.PI*2,b=(Math.random()-.5)*.9;c.position.set(Math.cos(a)*Math.cos(b)*s.size,Math.sin(b)*s.size,Math.sin(a)*Math.cos(b)*s.size);g.add(c);}}
  if(s.craters){const cm=new THREE.MeshPhongMaterial({color:0x777777});for(let i=0;i<6;i++){const c=new THREE.Mesh(new THREE.SphereGeometry(.12+Math.random()*.12,8,6),cm);const a=Math.random()*Math.PI*2,b=(Math.random()-.5)*.85;c.position.set(Math.cos(a)*Math.cos(b)*s.size,Math.sin(b)*s.size,Math.sin(a)*Math.cos(b)*s.size);g.add(c);}}
  if(s.galaxy){const gm=new THREE.MeshPhongMaterial({color:s.galColor||s.color,transparent:true,opacity:.35,side:THREE.DoubleSide});const gr=new THREE.Mesh(new THREE.TorusGeometry(s.size*1.45,.09,4,40),gm);gr.rotation.x=Math.PI/3;g.add(gr);}
  if(s.type==='mystery'){g.add(new THREE.Mesh(new THREE.SphereGeometry(s.size*1.5,16,12),new THREE.MeshPhongMaterial({color:0x220022,transparent:true,opacity:.5,side:THREE.DoubleSide})));}
  return g;
}
function mkGalaxyEnter(s){
  const g=new THREE.Group();const col=new THREE.Color(s.color);
  const geo=new THREE.BufferGeometry();const pos=new Float32Array(800*3);
  for(let i=0;i<800;i++){const a=Math.random()*Math.PI*2,r=Math.pow(Math.random(),.5)*4.0;pos[i*3]=Math.cos(a+r*.6)*r;pos[i*3+1]=(Math.random()-.5)*.7;pos[i*3+2]=Math.sin(a+r*.6)*r;}
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.add(new THREE.Points(geo,new THREE.PointsMaterial({color:col,size:.13,sizeAttenuation:true})));
  const ring=new THREE.Mesh(new THREE.TorusGeometry(3.0,.2,8,60),new THREE.MeshPhongMaterial({color:s.color,emissive:s.color,emissiveIntensity:.6,transparent:true,opacity:.9}));
  ring.rotation.x=Math.PI/2;g.add(ring);g.userData.ring=ring;
  for(let i=0;i<4;i++){const orb=new THREE.Mesh(new THREE.SphereGeometry(.25,8,6),new THREE.MeshPhongMaterial({color:s.color,emissive:s.color,emissiveIntensity:.4}));g.add(orb);g.userData['orb'+i]=orb;}
  g.userData.orbAngle=0;return g;
}
function mkBlackholeBase(){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.SphereGeometry(1.8,32,20),new THREE.MeshPhongMaterial({color:0x000000})));
  [0xff6600,0xff3300,0xffaa00,0x9900ff].forEach((c,i)=>{const r=new THREE.Mesh(new THREE.TorusGeometry(2.6+i*.5,.14,8,80),new THREE.MeshPhongMaterial({color:c,emissive:c,emissiveIntensity:1.6,transparent:true,opacity:.9-i*.15}));r.rotation.x=Math.PI/2+(i*.08);g.add(r);g.userData['disk'+i]=r;});
  const gr=new THREE.Mesh(new THREE.TorusGeometry(4.5,.1,8,100),new THREE.MeshPhongMaterial({color:0x9933ff,emissive:0x6600ff,emissiveIntensity:2.5,transparent:true,opacity:.8}));
  gr.rotation.x=Math.PI/2;g.add(gr);g.userData.glowring=gr;
  MP.forEach((m,i)=>{const orb=new THREE.Mesh(new THREE.SphereGeometry(m.size,16,12),new THREE.MeshPhongMaterial({color:m.color}));const fog=new THREE.Mesh(new THREE.SphereGeometry(m.size*1.5,8,6),new THREE.MeshPhongMaterial({color:0x220033,transparent:true,opacity:.5,side:THREE.DoubleSide}));orb.add(fog);g.add(orb);g.userData['mp'+i]=orb;g.userData['mpA'+i]=i*(Math.PI*2/MP.length);});
  return g;
}
let rocketMesh=null;
function mkRocket(sk){
  if(rocketMesh)scene.remove(rocketMesh);
  const s=SKINS.find(x=>x.id===sk)||SKINS[0];
  const g=new THREE.Group();
  const bm=new THREE.MeshPhongMaterial({color:s.bc,shininess:120});
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(.2,.27,1.2,16),bm));
  const n=new THREE.Mesh(new THREE.ConeGeometry(.2,.5,16),bm);n.position.y=.85;g.add(n);
  const wm=new THREE.MeshPhongMaterial({color:s.wc});
  [-1,1].forEach(x=>{const w=new THREE.Mesh(new THREE.BoxGeometry(.06,.38,.34),wm);w.position.set(x*.25,-.42,0);w.rotation.z=x*.25;g.add(w);});
  const fl=new THREE.Mesh(new THREE.ConeGeometry(.13,.5,12),new THREE.MeshPhongMaterial({color:0xff6600,emissive:0xff3300,emissiveIntensity:1.2}));
  fl.position.y=-.95;fl.rotation.z=Math.PI;g.add(fl);g.userData.fl=fl;
  const fl2=new THREE.Mesh(new THREE.ConeGeometry(.09,.9,8),new THREE.MeshPhongMaterial({color:0xffff00,emissive:0xffaa00,emissiveIntensity:1.8,transparent:true,opacity:.8}));
  fl2.position.y=-1.55;fl2.rotation.z=Math.PI;g.add(fl2);g.userData.fl2=fl2;
  rocketMesh=g;scene.add(g);return g;
}
let rocket=mkRocket('s0');
let botMesh=null,topMesh=null;

function stopSz(s){if(s.type==='planet'||s.type==='mystery')return s.size;if(s.type==='galaxy_enter')return 3.0;return 2.2;}
function rocketOn(py,s){return py+stopSz(s)+0.7;}
function mkStop(s){if(s.type==='planet'||s.type==='mystery')return mkPlanet(s);if(s.type==='galaxy_enter')return mkGalaxyEnter(s);return mkBlackholeBase();}

function applyBg(s){
  scene.background=new THREE.Color(s.bg);
  scene.fog=new THREE.Fog(s.bg,50,120);
  if(s.type==='blackhole_enter'||s.type==='blackhole_core'||s.type==='mystery'){pl.color.set(0x9933ff);pl.intensity=4;}
  else if(s.type==='galaxy_enter'||s.galaxy){pl.color.set(new THREE.Color(s.color||s.galColor||0x7F77DD));pl.intensity=2.5;}
  else{pl.color.set(0x6644ff);pl.intensity=2;}
}

function buildScene(){
  if(botMesh){scene.remove(botMesh);botMesh=null;}
  if(topMesh){scene.remove(topMesh);topMesh=null;}
  const s=STOPS[idx];applyBg(s);
  botMesh=mkStop(s);botMesh.position.set(0,BOT_Y,0);scene.add(botMesh);
  if(idx+1<STOPS.length){
    topMesh=mkStop(STOPS[idx+1]);
    topMesh.position.set(0,TOP_Y,0);
    topMesh.visible=false; // oculto hasta la llegada
    scene.add(topMesh);
  }
  rocket.position.set(0,rocketOn(BOT_Y,STOPS[idx]),0);rocket.rotation.set(0,0,0);
  cam.position.set(0,0,14);cam.lookAt(0,0,0);
  phase='idle';animT=0;canTap=true;updateAll();
}

function lerp(a,b,t){return a+(b-a)*t;}
function eI(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

function getDiff(){if(idx<9)return '⭐ Facil';if(idx<18)return '⭐⭐ Normal';if(idx<40)return '⭐⭐⭐ Dificil';if(idx<60)return '💀 Muy dificil';return '☠️ EXTREMO';}
function fmtTime(s){if(s<60)return Math.ceil(s)+'s';return Math.floor(s/60)+'m '+Math.ceil(s%60)+'s';}

function updateAll(){
  document.getElementById('hs').textContent=score;
  document.getElementById('hc').textContent=Math.round(coins).toLocaleString()+' ✦';
  document.getElementById('hd').textContent=STOPS[idx].name;
  document.getElementById('diff').textContent=getDiff();
  document.getElementById('oc').textContent=ownedSkins.size+'/100';
  const cur=STOPS[idx],next=STOPS[idx+1];
  let msg='';
  if(idx===STOPS.length-1)msg='🏆 CONQUISTASTE EL UNIVERSO ANIBAL!';
  else if(cur.name==='Luna')msg='🌙 En la Luna — toca! Viaje de '+fmtTime(getFlyDur(idx))+' 🚀';
  else if(cur.type==='blackhole_core')msg='☠️ NUCLEO del Hoyo Negro!';
  else if(cur.type==='blackhole_enter')msg='🕳️ Hoyo Negro!';
  else if(cur.type==='mystery')msg='👾 '+cur.name+' — toca! Siguiente: '+fmtTime(getFlyDur(idx));
  else if(cur.type==='galaxy_enter')msg='🌀 '+cur.name+' — toca! Viaje: '+fmtTime(getFlyDur(idx));
  else if(cur.galaxy)msg='🌟 '+cur.name+' — viaje a '+(next?next.name:'')+': '+fmtTime(getFlyDur(idx));
  else msg='🪐 En '+cur.name+' — viaje a '+(next?next.name:'')+': '+fmtTime(getFlyDur(idx));
  document.getElementById('msgbar').textContent=msg;
  const bar=document.getElementById('pbar');bar.innerHTML='';
  STOPS.forEach((s,i)=>{
    const el=document.createElement('span');
    el.className='ps'+(i<idx?' done':i===idx?' cur':'');
    const icon=s.type==='blackhole_core'?'☠️':s.type==='blackhole_enter'?'🕳️':s.type==='mystery'?'👾':s.type==='galaxy_enter'?'🌀':'';
    el.textContent=(i<idx?'✓ ':icon)+s.name;
    bar.appendChild(el);
    if(i<STOPS.length-1){const sep=document.createElement('span');sep.style.cssText='color:#333;font-size:9px';sep.textContent='›';bar.appendChild(sep);}
  });
  buildShop();
}
function buildShop(){
  const cont=document.getElementById('skns');cont.innerHTML='';
  SKINS.forEach(sk=>{
    const btn=document.createElement('button');
    const owned=ownedSkins.has(sk.id),active=activeSkin===sk.id;
    btn.className='sb'+(active?' active':owned?' owned':'');
    const cs=sk.cost===0?'Gratis':owned?'Equipar':'✦'+sk.cost.toLocaleString();
    btn.innerHTML=`<span style="font-size:15px">${sk.emoji}</span><span>${sk.name}</span><span class="sc">${cs}</span>`;
    if(!owned&&coins<sk.cost)btn.disabled=true;
    btn.addEventListener('click',()=>{
      if(owned){activeSkin=sk.id;rocket=mkRocket(sk.id);rocket.position.set(0,rocketOn(BOT_Y,STOPS[idx]),0);}
      else if(coins>=sk.cost){coins-=sk.cost;ownedSkins.add(sk.id);activeSkin=sk.id;rocket=mkRocket(sk.id);rocket.position.set(0,rocketOn(BOT_Y,STOPS[idx]),0);updateAll();}
      buildShop();
    });
    cont.appendChild(btn);
  });
}
function showBig(txt,col){
  const el=document.getElementById('bigmsg');
  el.innerHTML=txt;el.style.background=col||'rgba(29,158,117,.95)';el.style.display='block';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',2000);
}
function tap(){if(!canTap||phase!=='idle'||idx>=STOPS.length-1)return;canTap=false;phase='flying';animT=0;}
canvas.addEventListener('pointerdown',tap);
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();tap();}});
buildScene();

const clock=new THREE.Clock();
let starScrollY=0;

function animMesh(m){
  if(!m)return;
  m.rotation.y+=.004;
  if(m.userData.ring)m.userData.ring.rotation.z+=.007;
  [0,1,2,3].forEach(i=>{if(m.userData['disk'+i])m.userData['disk'+i].rotation.z+=.018+i*.009;});
  if(m.userData.glowring)m.userData.glowring.rotation.z+=.005;
  if(m.userData.orb0!==undefined){m.userData.orbAngle=(m.userData.orbAngle||0)+.02;[0,1,2,3].forEach(i=>{const a=m.userData.orbAngle+i*(Math.PI*2/4);if(m.userData['orb'+i])m.userData['orb'+i].position.set(Math.cos(a)*3.8,0,Math.sin(a)*3.8);});}
  MP.forEach((mp,i)=>{if(m.userData['mp'+i]){m.userData['mpA'+i]=(m.userData['mpA'+i]||0)+mp.speed;const a=m.userData['mpA'+i];m.userData['mp'+i].position.set(Math.cos(a)*mp.orbit,Math.sin(a*mp.tilt)*1.5,Math.sin(a)*mp.orbit);}});
}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);
  gT+=dt;
  animMesh(botMesh);animMesh(topMesh);

  if(phase==='idle'){
    animT=0;
    const s=STOPS[idx];
    rocket.position.y=rocketOn(BOT_Y,s)+Math.sin(gT*1.5)*.06;
    if(rocket.userData.fl)rocket.userData.fl.scale.y=.35+Math.sin(gT*6)*.08;
    if(rocket.userData.fl2)rocket.userData.fl2.scale.y=.2;
    // planetas visibles cerca
    if(botMesh){botMesh.position.y+=(BOT_Y-botMesh.position.y)*.1;}
    if(topMesh){topMesh.visible=false;}
    // camara cerca del planeta
    cam.position.z+=(14-cam.position.z)*.08;
    cam.position.y+=(0-cam.position.y)*.08;
    cam.lookAt(0,BOT_Y*.2,0);
    starField.position.y=0;
    document.getElementById('pfill').style.width='0%';
    document.getElementById('timer').textContent='';
  }

  if(phase==='flying'){
    animT+=dt;
    const totalDur=PHASE_LAUNCH+getFlyDur(idx)+PHASE_ARRIVE;
    const prog=Math.min(animT/totalDur,1);

    // — FASE 1: DESPEGUE (planeta actual se va abajo, cohete sube) —
    if(animT<PHASE_LAUNCH){
      const p=animT/PHASE_LAUNCH;
      const e=eI(p);
      // cohete despega del planeta
      rocket.position.y=lerp(rocketOn(BOT_Y,STOPS[idx]), 2, e);
      if(botMesh) botMesh.position.y=lerp(BOT_Y, BOT_Y-8, e);
      // camara se aleja
      cam.position.z+=((20+p*15)-cam.position.z)*.08;
      cam.lookAt(0,rocket.position.y*.3,0);
      if(rocket.userData.fl)rocket.userData.fl.scale.y=1.5+Math.sin(gT*25)*.4;
      if(rocket.userData.fl2)rocket.userData.fl2.scale.y=2.5+Math.sin(gT*20)*.6;
      starField.position.y=lerp(0,8,p);
    }
    // — FASE 2: VIAJE LARGO (cohete en el centro, estrellas vuelan) —
    else if(animT<PHASE_LAUNCH+getFlyDur(idx)){
      const travelT=animT-PHASE_LAUNCH;
      const travelDur=getFlyDur(idx);
      const p=travelT/travelDur;
      // cohete flota en el centro con pequeña oscilacion
      rocket.position.y=Math.sin(gT*1.2)*.15;
      // camara bien alejada — espacio profundo
      cam.position.z+=(36-cam.position.z)*.03;
      cam.position.y+=(0-cam.position.y)*.05;
      cam.lookAt(0,0,0);
      // llamas enormes
      if(rocket.userData.fl)rocket.userData.fl.scale.y=2.2+Math.sin(gT*30)*.5;
      if(rocket.userData.fl2)rocket.userData.fl2.scale.y=3.5+Math.sin(gT*24)*.8;
      // estrellas se mueven RAPIDISIMO para sensacion de velocidad
      starScrollY+=dt*80; // muy rapido!
      starField.position.y=starScrollY;
      // planeta destino aparece pequenito a lo lejos
      if(topMesh){
        topMesh.visible=true;
        topMesh.position.y=lerp(200,30,eI(p)); // viene de muy lejos
        const sc=lerp(0.05,0.4,eI(p));
        topMesh.scale.set(sc,sc,sc);
      }
      // tiempo restante
      const remaining=Math.max(0,travelDur-travelT);
      document.getElementById('timer').textContent='⏱ '+fmtTime(remaining)+' restante';
    }
    // — FASE 3: LLEGADA (planeta aparece grande, cohete aterriza) —
    else{
      const arrT=animT-(PHASE_LAUNCH+getFlyDur(idx));
      const p=Math.min(arrT/PHASE_ARRIVE,1);
      const e=eI(p);
      // planeta destino crece y baja a su posicion
      if(topMesh){
        topMesh.visible=true;
        topMesh.position.y=lerp(30,TOP_Y,e);
        const sc=lerp(0.4,1.0,e);
        topMesh.scale.set(sc,sc,sc);
      }
      // cohete baja al planeta
      rocket.position.y=lerp(0,rocketOn(TOP_Y,STOPS[idx+1]),e);
      // camara se acerca
      cam.position.z+=((14)-cam.position.z)*.06;
      cam.position.y+=(0-cam.position.y)*.06;
      cam.lookAt(0,TOP_Y*.2,0);
      if(rocket.userData.fl)rocket.userData.fl.scale.y=lerp(2.2,.35,e);
      if(rocket.userData.fl2)rocket.userData.fl2.scale.y=lerp(3.5,.2,e);
      starField.position.y+=dt*lerp(80,0,e); // estrellas se frenan
      document.getElementById('timer').textContent=p<1?'¡Llegando!':'';
    }

    document.getElementById('pfill').style.width=Math.round(prog*100)+'%';

    if(prog>=1){
      // llegamos!
      if(rocket.userData.fl)rocket.userData.fl.scale.y=.35;
      if(rocket.userData.fl2)rocket.userData.fl2.scale.y=.2;
      if(topMesh){topMesh.scale.set(1,1,1);topMesh.visible=true;}
      starScrollY=0;starField.position.y=0;
      document.getElementById('timer').textContent='';
      phase='done';idx++;score++;
      const bonus=30+score*12;coins+=bonus;
      const s=STOPS[idx];
      let msg='',col='rgba(29,158,117,.95)';
      if(s.type==='blackhole_core'){msg='☠️ NUCLEO! +'+bonus+' ✦ LEYENDA!';col='rgba(80,0,140,.97)';}
      else if(s.type==='blackhole_enter'){msg='🕳️ HOYO NEGRO! +'+bonus+' ✦';col='rgba(100,0,180,.97)';}
      else if(s.type==='mystery'){msg='👾 '+s.name+'! +'+bonus+' ✦';col='rgba(60,0,100,.95)';}
      else if(s.type==='galaxy_enter'){msg='🌀 '+s.name+'! +'+bonus+' ✦';col='rgba(60,30,150,.95)';}
      else if(s.galaxy){msg='🌟 '+s.name+'! +'+bonus+' ✦';col='rgba(80,40,160,.95)';}
      else msg='🎉 '+s.name+'! +'+bonus+' ✦';
      showBig(msg,col);
      scene.remove(botMesh);botMesh=topMesh;topMesh=null;
      botMesh.position.set(0,BOT_Y,0);botMesh.scale.set(1,1,1);
      applyBg(STOPS[idx]);
      if(idx+1<STOPS.length){topMesh=mkStop(STOPS[idx+1]);topMesh.position.set(0,TOP_Y,0);topMesh.visible=false;scene.add(topMesh);}
      rocket.position.set(0,rocketOn(BOT_Y,STOPS[idx]),0);
      updateAll();
      setTimeout(()=>{phase='idle';canTap=true;},500);
      if(idx===STOPS.length-1)setTimeout(()=>showBig('🏆 LEYENDA DEL UNIVERSO ANIBAL!<br>✦'+Math.round(coins).toLocaleString(),'rgba(127,119,221,.97)'),2200);
    }
  }
  renderer.render(scene,cam);
}
animate();
</script>
