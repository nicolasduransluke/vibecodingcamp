<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cami Caceres · AI Game Lab</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚧</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#08080f;color:#e8e8f8;font-family:'DM Mono',monospace;padding:20px}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,0.05) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
  .box{position:relative;text-align:center;padding:40px;max-width:520px}
  .emoji{font-size:90px;margin-bottom:24px;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  h1{font-family:'Syne',sans-serif;font-size:40px;margin:0 0 16px;font-weight:800;line-height:1;letter-spacing:-1.5px;background:linear-gradient(135deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  p{color:#8a8aa0;margin:0 0 28px;font-size:15px;line-height:1.6}
  a{color:#a78bfa;text-decoration:none;font-size:13px;border:1px solid rgba(167,139,250,0.3);border-radius:100px;padding:10px 22px;display:inline-block;transition:all .2s}
  a:hover{background:rgba(167,139,250,0.1)}
  .tag{font-size:11px;color:#a78bfa;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px}
</style>
</head>
<body>
  <div class="box">
    <div class="tag">AI Game Lab · 9 Mayo 2026</div>
    <div class="emoji">🚧</div>
    <h1>Cami Caceres está construyendo</h1>
    <p>Vuelve en un rato — aquí va a estar el juego.</p>
    <a href="/">← vibecodingcamp.com</a>
  </div>
</body>
</html>
