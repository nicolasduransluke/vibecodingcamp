<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOLLOW</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0806;--paper:#110f0c;--accent:#c8472a;--accent2:#e8a030;--text:#d4c9b8;--muted:#6b5f52;--panel-bg:#0d0b09;--border:#2a2218;--red-glow:rgba(200,71,42,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',serif;min-height:100vh;overflow-x:hidden;cursor:default}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:0.4}
#game-wrapper{max-width:860px;margin:0 auto;padding:20px;position:relative}
#title-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.title-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 60%,rgba(200,71,42,0.08) 0%,transparent 70%)}
.title-art{position:relative;width:100%;max-width:600px;text-align:center;z-index:2}
.title-eyebrow{font-family:'Special Elite',monospace;font-size:.75rem;letter-spacing:.4em;color:var(--accent);text-transform:uppercase;margin-bottom:24px;opacity:0;animation:fadeUp 1s .3s forwards}
.title-main{font-family:'Playfair Display',serif;font-size:clamp(5rem,18vw,10rem);font-weight:900;line-height:.85;color:#fff;text-shadow:0 0 80px rgba(200,71,42,.4),0 0 160px rgba(200,71,42,.15);opacity:0;animation:fadeUp 1s .5s forwards}
.title-sub{font-family:'Crimson Text',serif;font-style:italic;font-size:1.1rem;color:var(--muted);margin-top:16px;letter-spacing:.1em;opacity:0;animation:fadeUp 1s .8s forwards}
.title-divider{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:32px auto;opacity:0;animation:fadeUp 1s 1s forwards}
.start-btn{font-family:'Special Elite',monospace;font-size:.8rem;letter-spacing:.35em;text-transform:uppercase;color:var(--text);background:transparent;border:1px solid var(--border);padding:14px 40px;cursor:pointer;position:relative;overflow:hidden;transition:color .3s,border-color .3s;opacity:0;animation:fadeUp 1s 1.2s forwards}
.start-btn::before{content:'';position:absolute;inset:0;background:var(--accent);transform:translateX(-101%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:-1}
.start-btn:hover{border-color:var(--accent);color:#fff}
.start-btn:hover::before{transform:translateX(0)}
#scene-screen{display:none}
.chapter-label{font-family:'Special Elite',monospace;font-size:.7rem;letter-spacing:.4em;color:var(--accent);text-transform:uppercase;margin-bottom:8px;opacity:0;animation:fadeIn .6s forwards}
.scene-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:700;line-height:1.1;margin-bottom:24px;opacity:0;animation:fadeIn .6s .1s forwards}
.panels-grid{display:grid;gap:4px;margin-bottom:28px;opacity:0;animation:fadeIn .8s .2s forwards}
.panels-grid.layout-2col{grid-template-columns:1fr 1fr}
.panels-grid.layout-wide{grid-template-columns:2fr 1fr}
.panels-grid.layout-tall{grid-template-columns:1fr}
.panels-grid.layout-3{grid-template-columns:1fr 1.4fr 1fr}
.panel{position:relative;overflow:hidden;background:var(--panel-bg);border:1px solid var(--border);min-height:160px}
.panel-inner{width:100%;height:100%;min-height:160px;display:flex;align-items:flex-end;padding:12px;position:relative}
.panel-art{position:absolute;inset:0;width:100%;height:100%}
.panel-caption{position:relative;z-index:2;font-family:'Special Elite',monospace;font-size:.68rem;letter-spacing:.05em;color:rgba(212,201,184,.8);background:rgba(10,8,6,.75);padding:4px 8px;line-height:1.4;max-width:80%}
.narrative{font-family:'Crimson Text',serif;font-size:1.12rem;line-height:1.75;color:var(--text);margin-bottom:28px;border-left:2px solid var(--border);padding-left:20px;opacity:0;animation:fadeIn .8s .4s forwards}
.narrative em{color:var(--accent2);font-style:italic}
.narrative strong{color:#fff;font-weight:600}
.choices-label{font-family:'Special Elite',monospace;font-size:.65rem;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;opacity:0;animation:fadeIn .6s .6s forwards}
.choices{display:flex;flex-direction:column;gap:8px;opacity:0;animation:fadeIn .8s .7s forwards}
.choice-btn{display:flex;align-items:center;gap:14px;background:transparent;border:1px solid var(--border);padding:14px 18px;cursor:pointer;text-align:left;font-family:'Crimson Text',serif;font-size:1.05rem;color:var(--muted);position:relative;overflow:hidden;transition:color .3s,border-color .3s}
.choice-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,rgba(200,71,42,.12),transparent);transition:width .4s}
.choice-btn:hover{color:var(--text);border-color:var(--muted)}
.choice-btn:hover::before{width:100%}
.choice-num{font-family:'Special Elite',monospace;font-size:.65rem;color:var(--accent);letter-spacing:.1em;min-width:20px}
#end-screen{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px 20px}
.end-tag{font-family:'Special Elite',monospace;font-size:.7rem;letter-spacing:.4em;color:var(--accent);margin-bottom:20px;opacity:0;animation:fadeIn 1s .3s forwards}
.end-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,4rem);font-weight:900;font-style:italic;color:#fff;margin-bottom:20px;opacity:0;animation:fadeIn 1s .5s forwards}
.end-text{font-family:'Crimson Text',serif;font-size:1.1rem;line-height:1.8;color:var(--muted);max-width:480px;margin:0 auto 36px;opacity:0;animation:fadeIn 1s .7s forwards}
.restart-btn{font-family:'Special Elite',monospace;font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);background:transparent;border:1px solid var(--accent);padding:12px 32px;cursor:pointer;transition:background .3s,color .3s;opacity:0;animation:fadeIn 1s 1s forwards}
.restart-btn:hover{background:var(--accent);color:#fff}
.progress-bar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--border);z-index:100}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s ease}
.top-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0 28px;border-bottom:1px solid var(--border);margin-bottom:32px}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;letter-spacing:.05em;color:var(--muted)}
.nav-scene{font-family:'Special Elite',monospace;font-size:.65rem;letter-spacing:.3em;color:var(--muted)}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.4}94%{opacity:1}96%{opacity:.6}97%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.flicker{animation:flicker 6s infinite}
#transition-overlay{position:fixed;inset:0;background:#000;z-index:500;opacity:0;pointer-events:none;transition:opacity .4s}
#transition-overlay.active{opacity:1;pointer-events:all}
@media(max-width:600px){.panels-grid.layout-2col,.panels-grid.layout-wide,.panels-grid.layout-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
<div id="transition-overlay"></div>
<div id="game-wrapper">
  <div id="title-screen">
    <div class="title-bg"></div>
    <div class="title-art">
      <div class="title-eyebrow">A Graphic Novel</div>
      <div class="title-main flicker">HOLLOW</div>
      <div class="title-sub">Your story awaits.</div>
      <div class="title-divider"></div>
      <button class="start-btn" onclick="startGame()">Begin Reading</button>
    </div>
  </div>
  <div id="scene-screen">
    <div class="top-nav">
      <div class="nav-logo">HOLLOW</div>
      <div class="nav-scene" id="nav-scene-label"></div>
    </div>
    <div id="scene-content"></div>
  </div>
  <div id="end-screen">
    <div class="end-tag" id="end-tag"></div>
    <div class="end-title" id="end-title"></div>
    <div class="end-text" id="end-text"></div>
    <button class="restart-btn" onclick="restartGame()">↺ Read Again</button>
  </div>
</div>
