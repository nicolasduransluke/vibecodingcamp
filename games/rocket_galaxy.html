<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Galaxy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;min-height:100vh;padding:1rem;}
#title-bar{text-align:center;padding:0.8rem 0 0.5rem;}
#title-bar h1{font-size:28px;font-weight:600;letter-spacing:0.1em;background:linear-gradient(90deg,#a855f7,#22d3ee,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#title-bar p{font-size:11px;color:#6b7280;letter-spacing:0.14em;text-transform:uppercase;margin-top:3px;}
#root{display:flex;gap:12px;max-width:900px;margin:0 auto;}
#sidebar{width:175px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;}
#main{flex:1;min-width:0;}
#canvas-wrap{position:relative;margin-bottom:8px;}
#space-canvas{width:100%;height:320px;border-radius:12px;border:1px solid #1f2937;display:block;overflow:hidden;}
canvas{width:100%;height:100%;display:block;}
.sb-card{background:#111827;border-radius:8px;padding:0.5rem 0.65rem;border:1px solid #1f2937;}
.sb-label{font-size:10px;color:#6b7280;margin-bottom:2px;}
.sb-value{font-size:16px;font-weight:600;}
.coins-val{color:#f59e0b;}.rebirth-val{color:#a855f7;}.mult-val{color:#22d3ee;font-size:13px;}
.sb-bar-outer{height:3px;background:#1f2937;border-radius:2px;margin-top:4px;overflow:hidden;}
.sb-bar-inner{height:3px;border-radius:2px;}
.sb-dest{font-size:10px;font-weight:600;line-height:1.4;}
.speed-card{background:#111827;border-radius:8px;padding:0.5rem 0.65rem;border:1px solid #1f2937;}
.speed-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.speed-label{font-size:10px;color:#6b7280;}
.speed-val{font-size:13px;font-weight:600;color:#22d3ee;}
.speed-slider{width:100%;accent-color:#22d3ee;cursor:pointer;margin:0;}
.speed-max{font-size:9px;color:#4b5563;text-align:right;margin-top:3px;}
.launch-btn{width:100%;padding:11px 6px;font-size:13px;font-weight:600;background:#1f2937;border:1px solid #374151;border-radius:12px;cursor:pointer;color:#e2e8f0;transition:background 0.15s,transform 0.1s;}
.launch-btn:hover:not(:disabled){background:#374151;}
.launch-btn:active:not(:disabled){transform:scale(0.97);}
.launch-btn:disabled{opacity:0.4;cursor:not-allowed;}
.rebirth-btn{width:100%;padding:9px 6px;font-size:12px;font-weight:600;background:transparent;border:1px solid #a855f7;border-radius:12px;cursor:pointer;color:#a855f7;transition:background 0.15s,transform 0.1s;}
.rebirth-btn:hover:not(:disabled){background:rgba(168,85,247,0.1);}
.rebirth-btn:active:not(:disabled){transform:scale(0.97);}
.rebirth-btn:disabled{opacity:0.28;cursor:not-allowed;}
.ctrl-hint{font-size:10px;color:#6b7280;text-align:center;margin-bottom:4px;opacity:0;transition:opacity 0.4s;min-height:14px;}
.ctrl-hint.show{opacity:1;}
.prog-section{margin-bottom:5px;}
.prog-label{display:flex;justify-content:space-between;font-size:10px;color:#6b7280;margin-bottom:3px;}
.prog-outer{height:5px;background:#1f2937;border-radius:3px;overflow:hidden;}
.prog-inner{height:5px;border-radius:3px;transition:width 0.4s;}
.section-label{font-size:10px;font-weight:600;color:#6b7280;margin-bottom:6px;letter-spacing:0.06em;text-transform:uppercase;}
.upgrades{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.upg-card{background:#111827;border:1px solid #1f2937;border-radius:8px;padding:0.5rem 0.6rem;}
.upg-name{font-size:11px;font-weight:600;margin-bottom:2px;}
.upg-sub{font-size:9px;color:#6b7280;margin-bottom:4px;}
.upg-bar{height:3px;background:#1f2937;border-radius:2px;margin-bottom:4px;}
.upg-fill{height:3px;border-radius:2px;transition:width 0.3s;}
.upg-btn{width:100%;padding:4px;font-size:9px;border:1px solid #374151;background:transparent;border-radius:6px;cursor:pointer;color:#e2e8f0;transition:background 0.15s;}
.upg-btn:hover:not(:disabled){background:#1f2937;}
.upg-btn:disabled{opacity:0.3;cursor:not-allowed;}
.log{font-size:10px;color:#6b7280;min-height:14px;text-align:center;margin-bottom:4px;}
.rebirth-info{font-size:10px;color:#a855f7;text-align:center;min-height:13px;}
#confirm-overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(2,4,14,0.92);border-radius:12px;align-items:center;justify-content:center;z-index:20;}
#confirm-overlay.show{display:flex;}
.confirm-box{background:#111827;border:1px solid #a855f7;border-radius:12px;padding:1.1rem 1.3rem;width:88%;max-width:290px;text-align:center;}
.confirm-title{font-size:15px;font-weight:600;color:#a855f7;margin-bottom:5px;}
.confirm-sub{font-size:11px;color:#9ca3af;margin-bottom:4px;line-height:1.5;}
.confirm-warn{font-size:11px;color:#ef4444;margin-bottom:5px;}
.confirm-gains{font-size:11px;color:#10b981;margin-bottom:3px;}
.confirm-next{font-size:10px;color:#6b7280;margin-bottom:10px;}
.confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.confirm-yes{padding:8px;font-size:12px;font-weight:600;background:#a855f7;border:none;border-radius:8px;cursor:pointer;color:#fff;}
.confirm-yes:hover{opacity:0.85;}
.confirm-no{padding:8px;font-size:12px;font-weight:600;background:transparent;border:1px solid #374151;border-radius:8px;cursor:pointer;color:#e2e8f0;}
.confirm-no:hover{background:#1f2937;}
.final-btn{width:100%;padding:10px;font-size:13px;font-weight:600;background:#a855f7;border:none;border-radius:12px;cursor:pointer;color:#fff;margin-top:8px;}
.final-btn:hover{opacity:0.88;}
@media(max-width:600px){#root{flex-direction:column;}#sidebar{width:100%;flex-direction:row;flex-wrap:wrap;}#sidebar .sb-card{flex:1;min-width:80px;}.speed-card{width:100%;}.launch-btn,.rebirth-btn{flex:1;}}
</style>
</head>
<body>
<div id="title-bar">
  <h1>ROCKET GALAXY</h1>
  <p>upgrade · launch · conquer the cosmos</p>
</div>
<div id="root">
<div id="sidebar">
  <div class="sb-card"><div class="sb-label">coins</div><div class="sb-value coins-val" id="coins-disp">100</div></div>
  <div class="sb-card" id="rebirth-card" style="display:none"><div class="sb-label">rebirths</div><div class="sb-value rebirth-val" id="rebirth-disp">0/25</div><div class="sb-bar-outer"><div class="sb-bar-inner" id="rebirth-bar" style="width:0%;background:#a855f7"></div></div></div>
  <div class="sb-card" id="mult-card" style="display:none"><div class="sb-label">multiplier</div><div class="sb-value mult-val" id="mult-disp">1.000x</div></div>
  <div class="sb-card"><div class="sb-label">destination</div><div class="sb-dest" id="dest-disp">Moon</div></div>
  <div class="speed-card">
    <div class="speed-row"><span class="speed-label">throttle</span><span class="speed-val" id="throttle-val">3.0x</span></div>
    <input type="range" class="speed-slider" id="throttle-slider" min="10" max="100" step="1" value="100">
    <div class="speed-max" id="throttle-max">max: 3.0x</div>
  </div>
  <button class="launch-btn" id="launch-btn">🚀 launch</button>
  <button class="rebirth-btn" id="rebirth-btn">✨ rebirth</button>
</div>
<div id="main">
  <div id="canvas-wrap">
    <div id="space-canvas"><canvas id="c"></canvas></div>
    <div id="confirm-overlay">
      <div class="confirm-box">
        <div class="confirm-title" id="ct">rebirth?</div>
        <div class="confirm-sub" id="cs"></div>
        <div class="confirm-warn" id="cw">your upgrades reset to level 0</div>
        <div class="confirm-gains" id="cg"></div>
        <div class="confirm-next" id="cn"></div>
        <div class="confirm-btns" id="cb"><button class="confirm-yes" id="cy">yes, rebirth</button><button class="confirm-no" id="cno">cancel</button></div>
        <button class="final-btn" id="final-btn" style="display:none">launch forever</button>
      </div>
    </div>
  </div>
  <div class="ctrl-hint" id="ctrl-hint">A / D to dodge · click boss · SPACE to laser</div>
  <div class="prog-section">
    <div class="prog-label"><span id="prog-label">galaxy progress</span><span id="prog-count">1/100</span></div>
    <div class="prog-outer"><div class="prog-inner" id="prog-bar" style="width:1%;background:linear-gradient(90deg,#3b82f6,#a855f7)"></div></div>
  </div>
  <div class="prog-section">
    <div class="prog-label"><span id="rp-label">galaxies to next rebirth</span><span id="rp-count">0/4</span></div>
    <div class="prog-outer"><div class="prog-inner" id="rp-bar" style="width:0%;background:#a855f7"></div></div>
  </div>
  <div class="section-label">upgrades</div>
  <div class="upgrades" id="upgrades-container"></div>
  <div class="log" id="log"></div>
  <div class="rebirth-info" id="rebirth-info"></div>
</div>
</div>

<script>
const MAX_REBIRTHS=25,TOTAL_DEST=100;
function galaxiesNeededForRebirth(n){return 4*Math.pow(2,n-1);}
function cumulativeForRebirths(n){let t=0;for(let i=1;i<=n;i++)t+=galaxiesNeededForRebirth(i);return t;}

const UPGRADES_DEF=[
  {id:"engine",name:"engine",emoji:"🔥",desc:"thrust +speed",baseCost:50,costMult:1.6,color:"#ef4444"},
  {id:"fuel",name:"fuel tank",emoji:"⛽",desc:"range",baseCost:40,costMult:1.5,color:"#10b981"},
  {id:"hull",name:"hull",emoji:"🛡",desc:"durability",baseCost:60,costMult:1.7,color:"#3b82f6"},
  {id:"nav",name:"nav",emoji:"📡",desc:"dodge speed",baseCost:80,costMult:1.8,color:"#ec4899"},
  {id:"shield",name:"shield",emoji:"🔵",desc:"absorbs hits",baseCost:120,costMult:2.0,color:"#38bdf8"},
  {id:"warp",name:"warp drive",emoji:"⚡",desc:"burst speed",baseCost:150,costMult:2.1,color:"#facc15"},
  {id:"laser",name:"laser",emoji:"🔫",desc:"SPACE to shoot",baseCost:200,costMult:2.3,color:"#f472b6"},
  {id:"reactor",name:"reactor",emoji:"☢",desc:"coins x2",baseCost:300,costMult:2.5,color:"#a3e635"},
];

const DEST_NAMES=["Moon","Mars","Asteroid Belt","Jupiter","Saturn","Uranus","Neptune","Pluto","Proxima Centauri","Andromeda","Triangulum","Whirlpool","Sombrero","Black Eye","Milky Way Core","Pinwheel","Sunflower","Cartwheel","Cigar","Large Magellanic Cloud","Small Magellanic Cloud","Sculptor","Fornax Cluster","Virgo Cluster","Coma Cluster","Perseus Cluster","Abell 2029","Abell 383","Abell 1689","Abell 2744","Stephan's Quintet","Hickson 44","Seyfert's Sextet","Arp 87","Arp 271","NGC 1300","NGC 4038","NGC 6872","NGC 5128","NGC 1512","IC 1101","IC 10","IC 342","IC 2163","Markarian's Chain","Markarian 231","Hoag's Object","Mayall's Object","Arp 220","Arp 299","Messier 82","Messier 87","Messier 101","Messier 104","Messier 106","Messier 108","Messier 110","Messier 81","Messier 63","Messier 64","3C 273 Quasar","Cygnus A","Centaurus A","Fornax A","Hydra A","Perseus A","Virgo A","Pictor A","Hercules A","Cygnus X-1","GN-z11","JADES-GS-z14","HD1","GLASS-z13","Maisie's Galaxy","Ceers-93316","SPT0418-47","SPT2349-56","SPT0346-52","HDF North","HDF South","HUDF","XDF","El Gordo","Bullet Cluster","Baby Bullet","Pandora's Cluster","El Anzuelo","Firefly Sparkle","Cosmic Vine","Cosmic Web Node A","Cosmic Web Node B","Filament Junction 1","Filament Junction 2","Dark Matter Void","Observable Edge Alpha","Observable Edge Beta","Observable Edge Gamma","Omega Horizon","The Final Galaxy"];

function makeDests(){return Array.from({length:TOTAL_DEST},(_,i)=>{const tier=Math.floor(i/10);return{name:DEST_NAMES[i]||`Galaxy ${i+1}`,index:i,reqScore:i===0?0:Math.round(i*8+tier*15+i*i*0.12),reward:Math.round(50*Math.pow(1.18,i)*(1+tier*0.5)),color:`hsl(${(i*36)%360},70%,65%)`};});}
const DESTS=makeDests();

let state={coins:100,rebirths:0,upgrades:{engine:0,fuel:0,hull:0,nav:0,shield:0,warp:0,laser:0,reactor:0},launching:false,bestGalaxyIndex:0,endgame:false,shieldActive:0,bossDefeated:false};
let throttlePct=1.0;

function galaxiesNeededForNext(){return cumulativeForRebirths(state.rebirths+1);}
function galaxiesNeededForCurrent(){return state.rebirths>0?cumulativeForRebirths(state.rebirths):0;}
function canRebirth(){return state.rebirths<MAX_REBIRTHS&&!state.launching&&(state.bestGalaxyIndex+1)>=galaxiesNeededForNext();}
function maxLevel(){return 10+state.rebirths*5;}
function bonusMult(){return(1+state.rebirths*0.005)*(state.upgrades.reactor>0?1+state.upgrades.reactor*0.15:1);}
function getScore(){const u=state.upgrades;return u.engine*2.5+u.fuel*2+u.hull*1.5+u.nav*2+u.shield+u.warp*2+u.laser*1.5+u.reactor*2;}
function getMaxFlightSpeed(){return Math.min(3+state.upgrades.engine*0.35+state.upgrades.warp*0.6,20);}
function getFlightSpeed(){return Math.max(1,getMaxFlightSpeed()*throttlePct);}
function getDodgeSpeed(){return Math.min(4+state.upgrades.nav*0.4,8);}
function getCurDest(){let d=DESTS[0];for(let x of DESTS)if(getScore()>=x.reqScore)d=x;return d;}
function upgCost(upg){return Math.round(upg.baseCost*Math.pow(upg.costMult,state.upgrades[upg.id]));}
function fmtNum(n){if(n>=1e15)return(n/1e15).toFixed(2)+"Q";if(n>=1e12)return(n/1e12).toFixed(2)+"T";if(n>=1e9)return(n/1e9).toFixed(2)+"B";if(n>=1e6)return(n/1e6).toFixed(2)+"M";if(n>=1e4)return(n/1e3).toFixed(1)+"K";return Math.round(n).toLocaleString();}

const throttleSlider=document.getElementById("throttle-slider");
const throttleVal=document.getElementById("throttle-val");
const throttleMax=document.getElementById("throttle-max");
function updateThrottleUI(){const maxSpd=getMaxFlightSpeed();const sliderPct=parseInt(throttleSlider.value)/100;throttlePct=sliderPct;const currentSpd=Math.max(1,maxSpd*sliderPct);throttleVal.textContent=currentSpd.toFixed(1)+"x";throttleMax.textContent="max: "+maxSpd.toFixed(1)+"x";const h=Math.round(120-sliderPct*100);throttleVal.style.color=`hsl(${h},80%,55%)`;}
throttleSlider.addEventListener("input",updateThrottleUI);

let audioCtx=null,rocketNodes=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function startRocketSound(){try{const ac=getAC();const m=ac.createGain();m.gain.setValueAtTime(0,ac.currentTime);m.gain.linearRampToValueAtTime(0.13,ac.currentTime+0.5);m.connect(ac.destination);const o1=ac.createOscillator();o1.type="sawtooth";o1.frequency.setValueAtTime(55,ac.currentTime);o1.frequency.linearRampToValueAtTime(85,ac.currentTime+2);const g1=ac.createGain();g1.gain.value=0.4;o1.connect(g1);g1.connect(m);o1.start();const buf=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const n=ac.createBufferSource();n.buffer=buf;n.loop=true;const f=ac.createBiquadFilter();f.type="bandpass";f.frequency.value=180;f.Q.value=0.5;const gn=ac.createGain();gn.gain.value=0.2;n.connect(f);f.connect(gn);gn.connect(m);n.start();rocketNodes={m,o1,n,ac};}catch(e){}}
function stopRocketSound(){if(!rocketNodes)return;try{const{m,o1,n,ac}=rocketNodes;m.gain.linearRampToValueAtTime(0,ac.currentTime+0.7);setTimeout(()=>{try{o1.stop();n.stop();}catch(e){}},800);}catch(e){}rocketNodes=null;}
function playHit(){try{const ac=getAC();const o=ac.createOscillator();o.type="square";o.frequency.setValueAtTime(200,ac.currentTime);o.frequency.exponentialRampToValueAtTime(55,ac.currentTime+0.2);const g=ac.createGain();g.gain.setValueAtTime(0.16,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.25);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.25);}catch(e){}}
function playThud(){try{const ac=getAC();const o=ac.createOscillator();o.type="sine";o.frequency.setValueAtTime(110,ac.currentTime);o.frequency.exponentialRampToValueAtTime(28,ac.currentTime+0.5);const g=ac.createGain();g.gain.setValueAtTime(0.26,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.5);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.5);}catch(e){}}
function playWin(){try{const ac=getAC();[[523,0],[659,0.15],[784,0.3],[1046,0.5],[1318,0.75],[1568,1.05]].forEach(([f,t])=>{const o=ac.createOscillator();o.type="sine";o.frequency.value=f;const g=ac.createGain();g.gain.setValueAtTime(0,ac.currentTime+t);g.gain.linearRampToValueAtTime(0.18,ac.currentTime+t+0.05);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+t+0.9);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+t);o.stop(ac.currentTime+t+1);});}catch(e){}}
function playBossHit(){try{const ac=getAC();const o=ac.createOscillator();o.type="sawtooth";o.frequency.setValueAtTime(440,ac.currentTime);o.frequency.exponentialRampToValueAtTime(110,ac.currentTime+0.3);const g=ac.createGain();g.gain.setValueAtTime(0.13,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.3);}catch(e){}}
function playBossDie(){try{const ac=getAC();for(let i=0;i<5;i++){const o=ac.createOscillator();o.type="sawtooth";o.frequency.setValueAtTime(300-i*40,ac.currentTime+i*0.1);o.frequency.exponentialRampToValueAtTime(30,ac.currentTime+i*0.1+0.4);const g=ac.createGain();g.gain.setValueAtTime(0.13,ac.currentTime+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.1+0.4);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+i*0.1);o.stop(ac.currentTime+i*0.1+0.4);}}catch(e){}}

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
let stars=[],rocket=null,particles=[],frame=0,animStarted=false;
let currentScene="Moon",winPhase=null,winAlpha=0,winRocketY=0;
let obstacles=[],lasers=[],obTimer=0;
let hitFlash=0,shieldFlash=0,rocketVX=0;
let boss=null,isBossFight=false,spaceJustPressed=false;

function drawStars(W,H,scroll){stars.forEach(s=>{if(scroll){s.y+=s.speed*scroll;if(s.y>H){s.y=0;s.x=Math.random()*W;}}ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.color||`rgba(255,255,255,${s.alpha})`;ctx.fill();if(s.r>1){ctx.beginPath();ctx.arc(s.x,s.y,s.r*2.5,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.alpha*0.07})`;ctx.fill();}});}

function drawBossArena(W,H){ctx.fillStyle="#03010a";ctx.fillRect(0,0,W,H);for(let i=0;i<6;i++){const cx=W*0.5+Math.cos(frame*0.008+i*1.05)*W*0.3,cy=H*0.4+Math.sin(frame*0.006+i*0.8)*H*0.2,r=60+i*30+Math.sin(frame*0.04+i)*20;const neb=ctx.createRadialGradient(cx,cy,0,cx,cy,r);neb.addColorStop(0,`hsla(${270+i*20},80%,25%,0.12)`);neb.addColorStop(1,"transparent");ctx.fillStyle=neb;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();}drawStars(W,H,false);if(frame%6<3){ctx.save();ctx.strokeStyle="rgba(180,80,255,0.2)";ctx.lineWidth=1;for(let i=0;i<5;i++){ctx.beginPath();let x=Math.random()*W,y=0;ctx.moveTo(x,y);while(y<H){x+=(Math.random()-0.5)*50;y+=Math.random()*40;ctx.lineTo(x,y);}ctx.stroke();}ctx.restore();}}
function drawFinalGalaxy(W,H){ctx.fillStyle="#010208";ctx.fillRect(0,0,W,H);drawStars(W,H,false);const cx=W*0.5,cy=H*0.38;const core=ctx.createRadialGradient(cx,cy,0,cx,cy,60);core.addColorStop(0,"rgba(255,240,200,0.9)");core.addColorStop(0.5,"rgba(200,150,80,0.3)");core.addColorStop(1,"transparent");ctx.fillStyle=core;ctx.beginPath();ctx.arc(cx,cy,60,0,Math.PI*2);ctx.fill();for(let arm=0;arm<2;arm++){ctx.save();ctx.rotate(arm*Math.PI);ctx.translate(cx,cy);for(let i=0;i<200;i++){const t=i/200,angle=t*Math.PI*4,r=t*W*0.42,x=Math.cos(angle)*r,y=Math.sin(angle)*r*0.45;ctx.beginPath();ctx.arc(x,y,2-t*1.5,0,Math.PI*2);ctx.fillStyle=`rgba(${180+t*60},${150+t*80},${200+t*40},${Math.max(0,1-t)*0.8})`;ctx.fill();}ctx.restore();}const gY=H*0.64;const ground=ctx.createLinearGradient(0,gY,0,H);ground.addColorStop(0,"#1a0a3a");ground.addColorStop(1,"#060310");ctx.fillStyle=ground;ctx.beginPath();ctx.moveTo(0,gY);ctx.bezierCurveTo(W*0.2,gY-15,W*0.5,gY+10,W*0.8,gY-10);ctx.lineTo(W,gY+5);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.fill();}

function drawScene(W,H,name){switch(name){case"Moon":drawMoon(W,H);break;case"Mars":drawMars(W,H);break;case"Jupiter":drawJupiter(W,H);break;case"Saturn":drawSaturn(W,H);break;case"Uranus":drawUranus(W,H);break;case"Neptune":drawNeptune(W,H);break;case"Pluto":drawPluto(W,H);break;case"Asteroid Belt":drawAsteroidBelt(W,H);break;case"Omega Horizon":drawBossArena(W,H);break;case"The Final Galaxy":drawFinalGalaxy(W,H);break;default:{const d=DESTS.find(x=>x.name===name)||getCurDest();drawDeepSpace(W,H,d);}}}

function spawnBoss(W){boss={x:W/2,y:80,hp:40,maxHp:40,phase:0,vx:2,bullets:[],enraged:false,deathTimer:0,dead:false,flashTimer:0};}
function drawBoss(W,H){if(!boss||boss.dead)return;const b=boss;ctx.save();ctx.translate(b.x,b.y);if(b.flashTimer>0)ctx.globalAlpha=0.4+0.6*(b.flashTimer%4<2?1:0);ctx.beginPath();ctx.arc(0,0,36,0,Math.PI*2);ctx.fillStyle="#140228";ctx.fill();ctx.beginPath();ctx.arc(0,0,36,0,Math.PI*2);ctx.strokeStyle="#a855f7";ctx.lineWidth=3;ctx.stroke();for(let i=0;i<8;i++){ctx.save();ctx.rotate(b.phase+i*Math.PI/4);ctx.beginPath();ctx.moveTo(30,0);ctx.lineTo(50,0);ctx.strokeStyle=b.enraged?"#ef4444":"#a855f7";ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.moveTo(50,0);ctx.lineTo(44,-5);ctx.lineTo(44,5);ctx.fillStyle=b.enraged?"#ef4444":"#a855f7";ctx.fill();ctx.restore();}const eyeG=ctx.createRadialGradient(0,0,0,0,0,20);eyeG.addColorStop(0,b.enraged?"#ff2000":"#9040ff");eyeG.addColorStop(1,b.enraged?"#8b0000":"#4020a0");ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fillStyle=eyeG;ctx.fill();ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fillStyle="#000";ctx.fill();ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fillStyle=b.enraged?"#fde68a":"#d080ff";ctx.fill();if(rocket){const dx=rocket.x-b.x,dy=rocket.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);ctx.beginPath();ctx.arc(dx/dist*5,dy/dist*5,3,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();}ctx.restore();ctx.save();ctx.fillStyle="rgba(0,0,0,0.6)";ctx.fillRect(W/2-60,12,120,10);const hp=boss.hp/boss.maxHp;ctx.fillStyle=hp>0.5?"#10b981":hp>0.25?"#f59e0b":"#ef4444";ctx.fillRect(W/2-60,12,120*hp,10);ctx.strokeStyle="rgba(255,255,255,0.25)";ctx.lineWidth=1;ctx.strokeRect(W/2-60,12,120,10);ctx.fillStyle="#fff";ctx.font="bold 9px system-ui";ctx.textAlign="center";ctx.fillText("VOID BOSS",W/2,21);ctx.textAlign="left";ctx.restore();b.bullets.forEach(bl=>{ctx.beginPath();ctx.arc(bl.x,bl.y,6,0,Math.PI*2);ctx.fillStyle=b.enraged?"#ef4444":"#c084fc";ctx.fill();ctx.beginPath();ctx.arc(bl.x,bl.y,4,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();});}
function updateBoss(W,H){if(!boss||boss.dead)return;const b=boss;b.phase+=0.04;if(b.flashTimer>0)b.flashTimer--;b.x+=b.vx*(b.enraged?1.6:1);if(b.x<50||b.x>W-50)b.vx*=-1;if(frame%Math.max(10,30-Math.floor(b.phase*2))===0){const angle=rocket?Math.atan2(rocket.y-b.y,rocket.x-b.x):Math.PI/2;const spread=b.enraged?3:1;for(let i=0;i<spread;i++){const a=angle+(i-(spread-1)/2)*0.3;b.bullets.push({x:b.x,y:b.y,vx:Math.cos(a)*(b.enraged?4:2.5),vy:Math.sin(a)*(b.enraged?4:2.5)});}}b.bullets=b.bullets.filter(bl=>{bl.x+=bl.vx;bl.y+=bl.vy;return bl.x>-10&&bl.x<W+10&&bl.y>-10&&bl.y<H+10;});if(b.hp<b.maxHp*0.4&&!b.enraged){b.enraged=true;setLog("VOID BOSS ENRAGED!");}if(rocket&&rocket.active){b.bullets.forEach((bl,idx)=>{const dx=rocket.x-bl.x,dy=rocket.y-bl.y;if(Math.sqrt(dx*dx+dy*dy)<16){b.bullets.splice(idx,1);hitRocket();}});const dx=rocket.x-b.x,dy=rocket.y-b.y;if(Math.sqrt(dx*dx+dy*dy)<50)hitRocket();}}
function hitBoss(){if(!boss||boss.dead)return;boss.hp--;boss.flashTimer=6;playBossHit();if(boss.hp<=0){boss.dead=true;boss.deathTimer=80;playBossDie();state.bossDefeated=true;setLog("VOID BOSS DEFEATED! the path is open!");}}

function updateThrottleSliderRange(){throttleSlider.value=Math.round(throttlePct*100);updateThrottleUI();}
function updateTopStats(){const h=state.rebirths>0;document.getElementById("rebirth-card").style.display=h?"":"none";document.getElementById("mult-card").style.display=h?"":"none";if(h){document.getElementById("rebirth-disp").textContent=`${state.rebirths}/25`;document.getElementById("rebirth-bar").style.width=(state.rebirths/25*100).toFixed(1)+"%";document.getElementById("mult-disp").textContent=bonusMult().toFixed(3)+"x";}}
function renderUpgrades(){const container=document.getElementById("upgrades-container");container.innerHTML="";const max=maxLevel();UPGRADES_DEF.forEach(upg=>{const level=state.upgrades[upg.id],cost=upgCost(upg),canAfford=state.coins>=cost,maxed=level>=max;const card=document.createElement("div");card.className="upg-card";card.innerHTML=`<div class="upg-name">${upg.emoji} ${upg.name}</div><div class="upg-sub">lv ${level}/${max} · ${upg.desc}</div><div class="upg-bar"><div class="upg-fill" style="width:${(level/max*100).toFixed(1)}%;background:${upg.color};"></div></div><button class="upg-btn" ${(!canAfford||maxed||state.launching||state.endgame)?"disabled":""} onclick="buyUpgrade('${upg.id}')">${maxed?"maxed":(canAfford?`upgrade · ${fmtNum(cost)}`:`${fmtNum(cost)}`)}</button>`;container.appendChild(card);});}
function updateDisplay(){if(state.endgame)return;document.getElementById("coins-disp").textContent=fmtNum(state.coins);const dest=getCurDest();document.getElementById("dest-disp").textContent=`#${dest.index+1} ${dest.name}`;document.getElementById("launch-btn").disabled=state.launching;if(state.rebirths>=MAX_REBIRTHS){document.getElementById("rebirth-btn").textContent="🏆 end game";document.getElementById("rebirth-btn").disabled=false;}else{document.getElementById("rebirth-btn").textContent="✨ rebirth";document.getElementById("rebirth-btn").disabled=!canRebirth();}document.getElementById("prog-bar").style.width=Math.max(0.5,((dest.index+1)/100*100)).toFixed(1)+"%";document.getElementById("prog-count").textContent=`${dest.index+1}/100`;document.getElementById("prog-label").textContent=`galaxy ${dest.index+1}: ${dest.name}`;const maxR=state.rebirths>=MAX_REBIRTHS,gc=state.bestGalaxyIndex+1,nt=galaxiesNeededForNext(),ht=galaxiesNeededForCurrent(),ntr=nt-ht,ptr=Math.min(gc-ht,ntr);document.getElementById("rp-bar").style.width=(maxR?100:Math.min(100,(ptr/ntr*100))).toFixed(1)+"%";document.getElementById("rp-bar").style.background=canRebirth()?"#a855f7":"#6366f1";if(maxR){document.getElementById("rp-label").textContent="max rebirths!";document.getElementById("rp-count").textContent="25/25";}else if(canRebirth()){document.getElementById("rp-label").textContent="rebirth available!";document.getElementById("rp-count").textContent="ready";}else{document.getElementById("rp-label").textContent="galaxies to next rebirth";document.getElementById("rp-count").textContent=`${Math.max(0,ptr)}/${ntr}`;}if(maxR)document.getElementById("rebirth-info").textContent=`reach galaxy 100 with 25 rebirths to win!`;else if(state.rebirths>0)document.getElementById("rebirth-info").textContent=`+${(state.rebirths*0.5).toFixed(1)}% bonus · max lv ${maxLevel()} · next needs ${ntr} galaxies`;else document.getElementById("rebirth-info").textContent=canRebirth()?`rebirth ready!`:`reach galaxy 4 for first rebirth`;updateThrottleSliderRange();updateTopStats();renderUpgrades();}
function buyUpgrade(id){if(state.endgame)return;const upg=UPGRADES_DEF.find(u=>u.id===id),cost=upgCost(upg);if(state.coins<cost||state.upgrades[id]>=maxLevel())return;state.coins-=cost;state.upgrades[id]++;if(id==="shield")state.shieldActive=state.upgrades.shield;updateDisplay();updateThrottleSliderRange();setLog(`${upg.emoji} ${upg.name} → lv ${state.upgrades[upg.id]}`);}
function doRebirth(){if(!canRebirth())return;state.rebirths++;state.upgrades={engine:0,fuel:0,hull:0,nav:0,shield:0,warp:0,laser:0,reactor:0};state.shieldActive=0;const nn=state.rebirths<MAX_REBIRTHS?galaxiesNeededForRebirth(state.rebirths+1):0;setLog(state.rebirths===MAX_REBIRTHS?`rebirth 25/25! reach galaxy 100 to win!`:`rebirth ${state.rebirths}/25! next needs ${nn} galaxies`);updateDisplay();spawnRebirthFx();}
function setLog(msg){document.getElementById("log").textContent=msg;}

document.getElementById("rebirth-btn").addEventListener("click",()=>{if(state.endgame)return;if(state.rebirths>=MAX_REBIRTHS)showConfirmWin();else if(canRebirth())showConfirm();});
document.getElementById("launch-btn").addEventListener("click",()=>{if(state.launching||state.endgame)return;state.launching=true;obstacles=[];lasers=[];obTimer=30;rocketVX=0;const dest=getCurDest();isBossFight=(dest.index===98&&!state.bossDefeated);if(isBossFight)setLog("VOID BOSS! click · A/D · SPACE laser!");else setLog("A / D to dodge · SPACE to laser!");const W=canvas.offsetWidth,H=canvas.offsetHeight;rocket={x:W/2,y:H*0.65-26,active:true,phase:0,rewarded:false};startRocketSound();updateDisplay();});

window.buyUpgrade=buyUpgrade;
window.addEventListener("resize",()=>{initCanvas();});
initCanvas();currentScene=getCurDest().name;throttlePct=1.0;throttleSlider.value=100;updateThrottleUI();updateDisplay();
</script>
</body>
</html>
